name: Build webOS IPK (via Script)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout del codice (tuo fork)
        uses: actions/checkout@v4

      - name: Installa dipendenze base
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake make pkg-config wget git python3 npm curl protobuf-compiler

      - name: Installa ares-cli (LG Tools)
        run: sudo npm install -g @webos-tools/cli

      - name: Scarica e installa webOS NDK
        run: |
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/webosbrew/meta-lg-webos-ndk/releases/latest | grep "browser_download_url.*\.sh" | cut -d '"' -f 4 | head -n 1)
          wget -q $DOWNLOAD_URL -O ndk-installer.sh
          chmod +x ndk-installer.sh
          ./ndk-installer.sh -y -d /opt/webos-sdk

      - name: Prepara il codice originale di chiaki-ng
        run: |
          cd ..
          git clone --recursive https://github.com/streetpea/chiaki-ng.git

      - name: Avvia lo script di build automatico
        run: |
          source /opt/webos-sdk/environment-setup-*
          export TOOLCHAIN_DIR=/opt/webos-sdk
          chmod +x build-webos.sh
          ./build-webos.sh ../chiaki-ng

      - name: Salva il file .ipk
        uses: actions/upload-artifact@v4
        with:
          name: chiaki-lg-ipk
          path: "**/*.ipk"
