name: Build webOS IPK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Scarica dipendenze esterne (chiaki-ng e ss4s)
        run: |
          cd ..
          git clone --recursive https://github.com/streetpea/chiaki-ng.git
          cd $GITHUB_WORKSPACE
          git submodule update --init --recursive
          if [ ! -d "third-party/ss4s" ] || [ -z "$(ls -A third-party/ss4s)" ]; then
            mkdir -p third-party
            git clone https://github.com/mariotaku/ss4s.git third-party/ss4s
          fi

      - name: Installa dipendenze base
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake make pkg-config wget git python3 npm curl protobuf-compiler

      - name: Installa ares-cli (LG Tools)
        run: sudo npm install -g @webos-tools/cli

      - name: Scarica e installa webOS NDK
        run: |
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/webosbrew/meta-lg-webos-ndk/releases/latest | grep "browser_download_url.*\.sh" | cut -d '"' -f 4 | head -n 1)
          wget -q $DOWNLOAD_URL -O ndk-installer.sh
          chmod +x ndk-installer.sh
          ./ndk-installer.sh -y -d /opt/webos-sdk

      - name: Compila e Pacchetta
        run: |
          source /opt/webos-sdk/environment-setup-*
          
          sudo mkdir -p $OECORE_TARGET_SYSROOT/usr/lib/pkgconfig
          
          # Crea il file pkg-config per NDL_directmedia
          cat <<EOF | sudo tee $OECORE_TARGET_SYSROOT/usr/lib/pkgconfig/NDL_directmedia.pc > /dev/null
          prefix=/usr
          exec_prefix=\${prefix}
          libdir=\${exec_prefix}/lib
          includedir=\${prefix}/include
          
          Name: NDL_directmedia
          Description: LG webOS NDL DirectMedia library
          Version: 1.0.0
          Libs: -L\${libdir} -lNDL_directmedia
          Cflags: -I\${includedir}
          EOF
          
          # Crea il file pkg-config per lgncopenapi
          cat <<EOF | sudo tee $OECORE_TARGET_SYSROOT/usr/lib/pkgconfig/lgncopenapi.pc > /dev/null
          prefix=/usr
          exec_prefix=\${prefix}
          libdir=\${exec_prefix}/lib
          includedir=\${prefix}/include
          
          Name: lgncopenapi
          Description: LG webOS NC Open API library
          Version: 1.0.0
          Libs: -L\${libdir} -llgncopenapi
          Cflags: -I\${includedir}
          EOF
          
          # Compila miniupnpc per la TV
          git clone --depth 1 https://github.com/miniupnp/miniupnp.git
          cd miniupnp/miniupnpc
          mkdir build_arm && cd build_arm
          cmake .. -DCMAKE_SYSROOT=$OECORE_TARGET_SYSROOT -DCMAKE_INSTALL_PREFIX=$OECORE_TARGET_SYSROOT/usr -DUPNPC_BUILD_SHARED=ON -DUPNPC_BUILD_TESTS=OFF -DUPNPC_BUILD_SAMPLE=OFF
          make
          sudo -E make install
          cd ../../..
          
          # Compilazione finale di Chiaki
          mkdir build
          cd build
          cmake .. -DCMAKE_SYSROOT=$OECORE_TARGET_SYSROOT -DOPENSSL_ROOT_DIR=$OECORE_TARGET_SYSROOT/usr -DOPENSSL_INCLUDE_DIR=$OECORE_TARGET_SYSROOT/usr/include -DOPENSSL_CRYPTO_LIBRARY=$OECORE_TARGET_SYSROOT/usr/lib/libcrypto.so -DOPENSSL_SSL_LIBRARY=$OECORE_TARGET_SYSROOT/usr/lib/libssl.so
          make
          ares-package .

      - name: Salva il file .ipk
        uses: actions/upload-artifact@v4
        with:
          name: chiaki-lg-ipk
          path: build/*.ipk
