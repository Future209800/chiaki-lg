name: Build webOS IPK (Docker Environment)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # La magia: avviamo il processo dentro il container ufficiale di sviluppo LG
    container:
      image: ghcr.io/webosbrew/meta-lg-webos-ndk:latest

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Installa dipendenze nel container
        run: |
          apt-get update
          apt-get install -y curl wget git python3-pip protobuf-compiler python3-protobuf
          # Installiamo NodeJS e ares-cli per impacchettare l'IPK alla fine
          curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
          apt-get install -y nodejs
          npm install -g @webos-tools/cli

      - name: Prepara il codice originale di chiaki-ng
        run: |
          cd ..
          git clone --recursive https://github.com/streetpea/chiaki-ng.git

      - name: Compilazione tramite script
        run: |
          # Il container ha già il kit installato in /opt/webos-sdk, dobbiamo solo dichiararlo
          export TOOLCHAIN_DIR=/opt/webos-sdk
          source /opt/webos-sdk/environment-setup-*
          
          chmod +x build-webos.sh
          ./build-webos.sh ../chiaki-ng

      - name: Salva il file .ipk
        uses: actions/upload-artifact@v4
        with:
          name: chiaki-lg-ipk
          path: "**/*.ipk"
