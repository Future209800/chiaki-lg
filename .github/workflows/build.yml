name: Build webOS IPK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Installa dipendenze base
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake make pkg-config wget git python3 npm curl

      - name: Installa ares-cli (LG Tools)
        run: sudo npm install -g @webos-tools/cli

      - name: Scarica e installa webOS NDK
        run: |
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/webosbrew/meta-lg-webos-ndk/releases/latest | grep "browser_download_url.*\.sh" | cut -d '"' -f 4 | head -n 1)
          wget -q $DOWNLOAD_URL -O ndk-installer.sh
          chmod +x ndk-installer.sh
          ./ndk-installer.sh -y -d /opt/webos-sdk

      - name: Compila e Pacchetta
        run: |
          source /opt/webos-sdk/environment-setup-*
          mkdir build
          cd build
          cmake .. -DCMAKE_SYSROOT=$OECORE_TARGET_SYSROOT -DOPENSSL_ROOT_DIR=$OECORE_TARGET_SYSROOT/usr -DOPENSSL_INCLUDE_DIR=$OECORE_TARGET_SYSROOT/usr/include
          make
          ares-package .

      - name: Salva il file .ipk
        uses: actions/upload-artifact@v4
        with:
          name: chiaki-lg-ipk
          path: build/*.ipk
